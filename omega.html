<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omega_AI | Bio Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #0b2a22 0%, #041a16 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(226, 241, 218, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            transform: translateY(-2px) scale(1.02);
            background: rgba(236, 251, 228, 0.98);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.4);
        }
        
        .profile-ring {
            border: 3px solid #e2f1da;
            box-shadow: 0 0 30px rgba(226, 241, 218, 0.3);
            transition: all 0.3s ease;
        }
        
        .profile-ring:hover {
            transform: scale(1.05);
            border-color: #a3d38c;
            box-shadow: 0 0 40px rgba(163, 211, 140, 0.5);
        }
        
        .social-icon {
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
        }
        
        .social-icon:hover {
            transform: translateY(-3px);
            filter: drop-shadow(0 0 15px #a3d38c);
        }
        
        .feature-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }
        
        .ellipsis-icon {
            transition: all 0.2s ease;
            opacity: 0.7;
        }
        
        .glass-card:hover .ellipsis-icon {
            opacity: 1;
            transform: rotate(90deg);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-4 sm:p-6 text-white">

    <!-- Профиль с параллакс эффектом -->
    <div class="flex flex-col items-center w-full max-w-md mt-6 sm:mt-8 mb-6 sm:mb-8 text-center animate-fade-in">
        <div class="relative w-24 h-24 sm:w-28 sm:h-28 mb-4 overflow-hidden rounded-full profile-ring cursor-pointer">
            <img src="/logo1.jpg" 
                 alt="Omega_AI Avatar" 
                 class="object-cover w-full h-full transition-transform duration-500 hover:scale-110">
        </div>
        
        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight bg-gradient-to-r from-green-200 to-white bg-clip-text text-transparent">
            Omega_AI
        </h1>
        
        <div class="mt-4 max-w-sm">
            <p class="text-sm sm:text-base leading-relaxed text-gray-200 bg-black/20 backdrop-blur-sm p-4 rounded-2xl border border-white/10">
                <i class="fas fa-bolt text-green-300 mr-2"></i>
                Master AI | On English<br>
                ⭐ Англоязычный YouTube канал<br>
                🌍 Западный AI-эксклюзив
            </p>
        </div>
    </div>

    <!-- Основной контент (Карточки ссылок) -->
    <div class="w-full max-w-md space-y-4 px-2 sm:px-0">
        
        <!-- Главная карточка YouTube с превью -->
        <a href="https://www.youtube.com/@Omega_AI_Tool/shorts" onclick="openInApp('youtube://www.youtube.com/@Omega_AI_Tool/shorts', 'https://www.youtube.com/@Omega_AI_Tool/shorts'); return false;" class="block glass-card rounded-[2.5rem] overflow-hidden hover-scale cursor-pointer group">
            <div class="p-3">
                <div class="relative w-full overflow-hidden rounded-[2rem] h-48 sm:h-56">
                    <!-- Градиентное изображение с иконкой -->
                    <div class="absolute inset-0 bg-gradient-to-tr from-red-600 via-purple-600 to-blue-600 opacity-90"></div>
                    
                    <!-- Паттерн из точек -->
                    <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 1px); background-size: 20px 20px;"></div>
                    
                    <!-- Центральная иконка -->
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="text-center transform transition-transform group-hover:scale-110">
                            <i class="fab fa-youtube text-6xl sm:text-7xl text-white mb-2 drop-shadow-2xl"></i>
                            <span class="block text-white font-bold text-xl sm:text-2xl drop-shadow-lg">@Omega_AI</span>
                        </div>
                    </div>
                    
                    <!-- Индикатор просмотров -->
                    <div class="absolute bottom-4 right-4 bg-black/50 backdrop-blur-md rounded-full px-4 py-2 text-white text-sm border border-white/20">
                        <i class=""></i> subscribe 
                    </div>
                </div>
            </div>
            <div class="flex items-center justify-between px-6 sm:px-8 py-4 sm:py-6 text-black">
                <div class="flex items-center gap-3">
                    <i class="fab fa-youtube text-xl text-red-600"></i>
                    <span class="text-base sm:text-lg font-semibold">YouTube Channel</span>
                    <span class="bg-red-500 text-white text-xs px-2 py-1 rounded-full">NEW</span>
                </div>
                <i class="fas fa-ellipsis-v text-gray-500 ellipsis-icon"></i>
            </div>
        </a>

        <!-- Instagram карточка -->
        <a href="https://www.instagram.com/omega_ai_tools/" onclick="openInApp('instagram://user?username=omega_ai_tools', 'https://www.instagram.com/omega_ai_tools/'); return false;" class="flex items-center justify-between w-full p-4 sm:p-6 text-black glass-card rounded-full hover-scale cursor-pointer group">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 flex items-center justify-center">
                    <i class="fab fa-instagram text-2xl text-white"></i>
                </div>
                <div>
                    <span class="text-base sm:text-lg font-semibold block">Instagram</span>
                    <span class="text-xs text-gray-600">@omega_ai</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs bg-green-500 text-white px-3 py-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                    Follow
                </span>
                <i class="fas fa-chevron-right text-gray-500 group-hover:translate-x-1 transition-transform"></i>
            </div>
        </a>


    <!-- Футер с градиентом -->
    <footer class="mt-12 py-6 px-4 text-center">
        <div class="max-w-md mx-auto border-t border-white/10 pt-6">
            <p class="text-xs text-gray-400 opacity-70 hover:opacity-100 transition-opacity">
                © 2026 Omega_AI. All rights reserved. 
                <span class="block mt-1 text-green-300/50">Powered by MARK ⚡️</span>
            </p>
        </div>
    </footer>

    <!-- Добавляем анимации -->
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        
        .glass-card, .profile-ring, .social-icon {
            animation: fadeIn 0.5s ease-out forwards;
            animation-fill-mode: both;
        }
        
        .glass-card:nth-child(1) { animation-delay: 0.1s; }
        .glass-card:nth-child(2) { animation-delay: 0.2s; }
        .glass-card:nth-child(3) { animation-delay: 0.3s; }
        .glass-card:nth-child(4) { animation-delay: 0.4s; }
    </style>

    <!-- Скрипт для открытия приложений -->
    <script>
        function openInApp(appScheme, webUrl) {
            // Создаем невидимый iframe для открытия app scheme
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            // Пытаемся открыть приложение через iframe
            iframe.src = appScheme;
            
            // Если приложение не установлено, через 500ms открываем браузер в новой вкладке
            setTimeout(() => {
                document.body.removeChild(iframe);
                window.open(webUrl, '_blank');
            }, 500);
        }
    </script>
</body>
</html>
